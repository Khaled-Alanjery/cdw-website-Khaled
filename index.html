<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <main class="page">
    <section class="intro-block">
      <p>This project explores two 3D spatial studies built with three.js. The scenes use orbit controls, lighting, materials, and animated geometry to create immersive compositions focused on color, atmosphere, and form.</p>
    </section>

    <section class="canvas-section">
      <div id="threejs-1" class="three-canvas"></div>
    </section>

    <section class="canvas-section">
      <div id="threejs-2" class="three-canvas"></div>
    </section>

    <section class="canvas-section">
      <div id="sc-container-1" class="sc-container canvas-block"></div>
    </section>

    <section class="canvas-section">
      <div id="sc-container-2" class="sc-container canvas-block"></div>
    </section>
  </main>

  <script src="SC1.js"></script>
  <script src="SC2.js"></script>
  <script src="Three1.js"></script>
  <script src="Three2.js"></script>
</body>
</html>
