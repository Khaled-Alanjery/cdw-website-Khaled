<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

    <div id="sc-container-1" class="sc-container canvas-block"></div>
    <div id="sc-container-2" class="sc-container canvas-block"></div>
  </main>

  <script src="SC1.js"></script>
  <script src="SC2.js"></script>

  <script>
    const revealEls = document.querySelectorAll('.sc-container');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0 });
    revealEls.forEach(el => observer.observe(el));
  </script>
</body>
</html>
