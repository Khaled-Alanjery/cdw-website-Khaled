<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
  <header>
    <div class="left">Columbia GSAPP</div>
    <div class="center">
      Computational Design Practices<br>
      <span>Project Archive</span>
    </div>
    <div class="right"><a href="#">About</a></div>
  </header>

  <main>
    <div class="project-meta">2026</div>
    <div class="project-subtitle">Khaled Alanjery!</div>

    <div id="messageDisplay"></div>
    <div id="camera-container" class="canvas-block"></div>

    <div id="sc-container-1" class="sc-container canvas-block"></div>

    <div id="sc-container-2" class="sc-container canvas-block"></div>
  </main>

  <script src="script.js"></script>
  <script src="SC1.js"></script>
  <script src="SC2.js"></script>

  <script>
    const revealEls = document.querySelectorAll('.sc-container');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.2 });
    revealEls.forEach(el => observer.observe(el));
  </script>
</body>
</html>
